<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>通信系统原理 · 刷题系统</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='28'>📡</text></svg>">
</head>
<body>
<div class="container">
  <!-- 导航 -->
  <nav class="nav">
    <div class="breadcrumb">📡 通信系统原理 · 刷题系统</div>
    <div class="nav-links">
      <a href="index.html" class="btn btn-sm btn-primary">🏠 首页</a>
      <a href="exam.html" class="btn btn-sm">📝 刷题</a>
      <a href="wrong.html" class="btn btn-sm">📋 错题本</a>
      <a href="collect.html" class="btn btn-sm">⭐ 收藏</a>
      <a href="setting.html" class="btn btn-sm">⚙️ 设置</a>
      <button class="btn btn-sm btn-icon" id="themeToggle" title="切换深浅主题" onclick="toggleTheme()">🌓</button>
    </div>
  </nav>
  <!-- 标题 -->
  <div class="card" style="text-align:center;margin-top:16px;">
    <h1 style="font-size:1.6em;color:var(--primary);">📡 通信系统原理 · 刷题系统</h1>
    <p style="color:var(--text-secondary);margin-top:8px;">期末复习专用 · 离线可用 · 数据本地存储 · 支持GitHub Pages部署</p>
  </div>
  <!-- 搜索 -->
  <div class="card">
    <div class="search-box">
      <input type="search" id="globalSearch" placeholder="搜索题干、公式、答案关键词..." oninput="doSearch()">
    </div>
  </div>
  <!-- 统计看板 -->
  <div class="card">
    <div class="card-header"><span class="card-title">📊 学习统计</span></div>
    <div class="stats-grid" id="statsGrid">
      <div class="stat-item"><div class="stat-value" id="statTotal">0</div><div class="stat-label">总题量</div></div>
      <div class="stat-item"><div class="stat-value" id="statDone">0</div><div class="stat-label">已做题</div></div>
      <div class="stat-item"><div class="stat-value" id="statRate">0%</div><div class="stat-label">正确率</div></div>
      <div class="stat-item"><div class="stat-value" id="statScore">0</div><div class="stat-label">总分</div></div>
      <div class="stat-item"><div class="stat-value" id="statCollect">0</div><div class="stat-label">收藏</div></div>
      <div class="stat-item"><div class="stat-value" id="statErrors">0</div><div class="stat-label">错题</div></div>
      <div class="stat-item"><div class="stat-value" id="statWeak">0</div><div class="stat-label">薄弱题</div></div>
    </div>
  </div>
  <!-- 全局进度条 -->
  <div class="card">
    <div class="card-header"><span class="card-title">📈 全局进度</span></div>
    <div id="globalProgress"></div>
  </div>
  <!-- 刷题入口 -->
  <div class="card">
    <div class="card-header"><span class="card-title">🚀 刷题入口</span></div>
    <div class="btn-group">
      <a href="exam.html?type=single" class="btn btn-primary">📝 单选题 (32题)</a>
      <a href="exam.html?type=judge" class="btn btn-success">✅ 判断题 (33题)</a>
      <a href="exam.html?type=calc" class="btn btn-warning" style="background:var(--warning);color:#fff;border-color:var(--warning);">🔢 计算题 (4题)</a>
      <a href="exam.html?type=all" class="btn">🎲 全部随机刷题</a>
      <a href="collect.html" class="btn">⭐ 收藏专项练习</a>
      <a href="exam.html?mode=weak" class="btn btn-danger" id="weakBtn">🎯 薄弱题目专项</a>
    </div>
  </div>
  <!-- 快捷入口 -->
  <div class="card">
    <div class="card-header"><span class="card-title">📋 快捷工具</span></div>
    <div class="btn-group">
      <a href="wrong.html" class="btn">📋 错题本</a>
      <a href="setting.html" class="btn">⚙️ 设置面板</a>
    </div>
  </div>
  <!-- 搜索结果 (默认隐藏) -->
  <div class="card" id="searchResultsCard" style="display:none;">
    <div class="card-header">
      <span class="card-title">🔍 搜索结果</span>
      <span id="searchCount" style="font-size:0.85em;color:var(--text-secondary);"></span>
    </div>
    <div id="searchResults"></div>
  </div>
</div>
<!-- 弹窗 -->
<div class="modal-overlay" style="display:none;">
  <div class="modal"><h3></h3><div class="modal-body"></div><div class="btn-group"><button class="btn btn-cancel">取消</button><button class="btn btn-confirm">确认</button></div></div>
</div>
<!-- Toast -->
<div class="toast" style="display:none;"></div>
<script src="js/storage.js"></script>
<script src="js/question.js"></script>
<script src="js/common.js"></script>
<script>
// ===== 主题切换 =====
function toggleTheme() {
  const cfg = Storage.getConfig();
  cfg.theme = cfg.theme === 'dark' ? 'light' : 'dark';
  Storage.saveConfig(cfg);
  App.applyTheme(cfg.theme);
  document.getElementById('themeToggle').textContent = cfg.theme === 'dark' ? '☀️' : '🌓';
}
// ===== 初始化统计 =====
function updateStats() {
  const stats = App.getStats();
  document.getElementById('statTotal').textContent = stats.total;
  document.getElementById('statDone').textContent = stats.done;
  document.getElementById('statRate').textContent = stats.correctRate + '%';
  document.getElementById('statScore').textContent = stats.score;
  document.getElementById('statCollect').textContent = stats.collectCount;
  document.getElementById('statErrors').textContent = stats.errorCount;
  document.getElementById('statWeak').textContent = stats.weakCount;
  // 薄弱题数量
  const weakBtn = document.getElementById('weakBtn');
  weakBtn.textContent = `🎯 薄弱题目专项 (${stats.weakCount}题)`;
  if (stats.weakCount === 0) weakBtn.classList.add('btn');
  // 全局进度
  const records = Storage.getRecords();
  const answered = {};
  App.getQuestions().forEach(q => {
    const r = records[q.id];
    if (r && (r.correct > 0 || r.wrong > 0)) {
      answered[q.id] = r.correct > r.wrong;
    }
  });
  App.renderProgress(document.getElementById('globalProgress'), answered);
}
// ===== 全局搜索 =====
function doSearch() {
  const query = document.getElementById('globalSearch').value;
  const card = document.getElementById('searchResultsCard');
  const results = document.getElementById('searchResults');
  const count = document.getElementById('searchCount');
  if (!query || query.trim().length < 1) {
    card.style.display = 'none';
    return;
  }
  card.style.display = '';
  const filtered = App.searchQuestions(query, App.validQuestions());
  count.textContent = `找到 ${filtered.length} 题`;
  if (filtered.length === 0) {
    results.innerHTML = '<p style="color:var(--text-secondary);padding:16px;">未找到匹配题目，请尝试其他关键词</p>';
    return;
  }
  results.innerHTML = filtered.slice(0, 20).map(q => {
    const badgeClass = q.type === 'single' ? 'badge-single' : q.type === 'judge' ? 'badge-judge' : 'badge-calc';
    const typeLabel = q.type === 'single' ? '单选' : q.type === 'judge' ? '判断' : '计算';
    const records = Storage.getRecords();
    const r = records[q.id];
    const status = r ? (r.correct > r.wrong ? '✅' : r.wrong > r.correct ? '❌' : '⬜') : '⬜';
    return `<div class="card" style="padding:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
        <span><span class="badge ${badgeClass}">${typeLabel}</span> <strong>#${q.id}</strong> ${status} ${q.question.substring(0, 60)}...</span>
        <span style="font-size:0.8em;color:var(--text-secondary);">${q.chapter}</span>
      </div>
    </div>`;
  }).join('');
  if (filtered.length > 20) {
    results.innerHTML += `<p style="text-align:center;color:var(--text-secondary);padding:8px;">...还有 ${filtered.length - 20} 题，请使用更精确的关键词</p>`;
  }
}
// ===== 页面初始化 =====
document.addEventListener('DOMContentLoaded', () => {
  const cfg = Storage.getConfig();
  document.getElementById('themeToggle').textContent = cfg.theme === 'dark' ? '☀️' : '🌓';
  updateStats();
});
</script>
</body>
</html>
