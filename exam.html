<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>刷题 · 通信系统原理</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='28'>📝</text></svg>">
</head>
<body>
<div class="container">
  <!-- 导航 -->
  <nav class="nav">
    <a href="index.html" class="btn btn-sm">🏠 首页</a>
    <div class="nav-links">
      <span class="badge badge-single" id="filterAll" style="cursor:pointer;" data-type="all">全部</span>
      <span class="badge badge-single" id="filterSingle" style="cursor:pointer;" data-type="single">单选</span>
      <span class="badge badge-judge" id="filterJudge" style="cursor:pointer;" data-type="judge">判断</span>
      <span class="badge badge-calc" id="filterCalc" style="cursor:pointer;" data-type="calc">计算</span>
      <button class="btn btn-sm btn-icon" onclick="toggleTheme()" title="切换主题">🌓</button>
      <button class="star-btn" id="starBtn" onclick="toggleStar()">☆</button>
      <button class="btn btn-sm" id="shuffleBtn" onclick="toggleShuffle()" title="随机刷题">🔀</button>
    </div>
  </nav>
  <!-- 进度条 -->
  <div class="card" id="progressCard">
    <div id="examProgress"></div>
  </div>
  <!-- 计时与搜索 -->
  <div class="card" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
    <div class="timer" id="timerDisplay">⏱️ 00:00</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="shortcutHint" style="font-size:0.75em;color:var(--text-secondary);"></span>
      <button class="btn btn-sm" onclick="toggleAnswer()">💡 显示答案</button>
    </div>
  </div>
  <!-- 题目卡片 -->
  <div class="card" id="questionCard">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:4px;">
      <div>
        <span class="badge" id="qBadge">单选</span>
        <span style="font-size:0.8em;color:var(--text-secondary);margin-left:8px;" id="qNumber">第 1/69 题</span>
      </div>
      <span style="font-size:0.75em;color:var(--text-secondary);" id="qChapter"></span>
    </div>
    <div class="card-body">
      <div id="qQuestion" style="font-size:1.05em;margin-bottom:12px;font-family:var(--formula-family);"></div>
      <div id="qImage"></div>
      <div id="qOptions"></div>
      <div id="qCalcInput" style="display:none;"></div>
      <div id="qAnswer" style="display:none;margin-top:12px;padding:10px;background:var(--primary-light);border-radius:var(--radius-sm);border:1px solid var(--primary);"></div>
      <div id="qExplanation" style="display:none;margin-top:8px;padding:10px;background:var(--bg-input);border-radius:var(--radius-sm);font-size:0.85em;color:var(--text-secondary);"></div>
      <div id="qHistory" style="margin-top:12px;">
        <button class="btn btn-sm" id="historyToggle" onclick="toggleHistory()" style="display:none;">📜 查看作答历史</button>
        <div class="collapsible-content" id="historyContent"></div>
      </div>
    </div>
  </div>
  <!-- 底部操作 -->
  <div class="card" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
    <div class="btn-group">
      <button class="btn" onclick="prevQuestion()">⬅ 上一题</button>
      <button class="btn" onclick="nextQuestion()">下一题 ➡</button>
    </div>
    <div class="btn-group">
      <button class="btn btn-sm" onclick="toggleAnswer()">💡 答案</button>
      <button class="btn btn-sm" onclick="resetSession()">🔄 重置</button>
      <button class="btn btn-sm btn-danger" onclick="exitQuiz()">🚪 退出</button>
    </div>
  </div>
</div>
<script src="js/storage.js"></script>
<script src="js/question.js"></script>
<script src="js/common.js"></script>
<script>
// ===== 全局状态 =====
let questions = [];
let currentIndex = 0;
let answered = {}; // { qid: true/false } true=correct, false=wrong
let showAnswer = false;
let isRandom = true;
let currentFilter = 'all';
let currentQuestion = null;
let shuffledOptMap = null;
let shuffledNewAnswer = null;
// ===== 初始化 =====
function initExam() {
  const params = new URLSearchParams(window.location.search);
  const typeParam = params.get('type');
  const modeParam = params.get('mode');
  if (modeParam === 'weak') {
    const threshold = Storage.getConfig().weakThreshold;
    questions = App.getWeakQuestions(threshold);
    if (questions.length === 0) {
      App.showToast('暂无薄弱题目，请先刷题积累数据', 'error');
      questions = App.validQuestions();
    }
  } else if (typeParam && typeParam !== 'all') {
    questions = App.filterByType(App.validQuestions(), typeParam);
  } else {
    questions = App.validQuestions();
  }
  if (isRandom) questions = App.shuffle(questions);
  currentIndex = 0;
  currentFilter = typeParam || 'all';
  answered = {};
  updateBadges();
  renderQuestion();
  updateProgress();
}
function updateBadges() {
  const types = ['all', 'single', 'judge', 'calc'];
  const labels = ['全部', '单选', '判断', '计算'];
  types.forEach((t, i) => {
    const el = document.getElementById('filter' + t.charAt(0).toUpperCase() + t.slice(1));
    if (el) {
      el.style.opacity = currentFilter === t ? '1' : '0.5';
      el.onclick = () => { currentFilter = t; initExam(); };
    }
  });
}
function toggleTheme() {
  const cfg = Storage.getConfig();
  cfg.theme = cfg.theme === 'dark' ? 'light' : 'dark';
  Storage.saveConfig(cfg);
  App.applyTheme(cfg.theme);
}
function toggleShuffle() {
  isRandom = !isRandom;
  document.getElementById('shuffleBtn').style.background = isRandom ? 'var(--primary-light)' : '';
  initExam();
}
function toggleStar() {
  if (!currentQuestion) return;
  const collected = Storage.toggleCollect(currentQuestion.id);
  updateStarBtn(collected);
}
function updateStarBtn(collected) {
  const btn = document.getElementById('starBtn');
  btn.textContent = collected ? '★' : '☆';
  btn.classList.toggle('active', collected);
}
// ===== 渲染题目 =====
function renderQuestion() {
  if (!questions.length) {
    document.getElementById('qQuestion').textContent = '暂无题目';
    return;
  }
  if (currentIndex >= questions.length) currentIndex = 0;
  if (currentIndex < 0) currentIndex = questions.length - 1;
  currentQuestion = questions[currentIndex];
  const q = currentQuestion;
  // 更新题号
  document.getElementById('qNumber').textContent = `第 ${currentIndex + 1}/${questions.length} 题`;
  // 徽章
  const badgeEl = document.getElementById('qBadge');
  const typeLabels = { single: '单选', judge: '判断', calc: '计算' };
  const typeClasses = { single: 'badge-single', judge: 'badge-judge', calc: 'badge-calc' };
  badgeEl.textContent = typeLabels[q.type] || q.type;
  badgeEl.className = 'badge ' + (typeClasses[q.type] || '');
  // 章节
  document.getElementById('qChapter').textContent = q.chapter || '';
  // 题干
  document.getElementById('qQuestion').innerHTML = q.question;
  // 配图
  document.getElementById('qImage').innerHTML = App.renderImage(q.image);
  // 选项/判断/计算
  const optsDiv = document.getElementById('qOptions');
  const calcDiv = document.getElementById('qCalcInput');
  optsDiv.innerHTML = '';
  calcDiv.style.display = 'none';
  optsDiv.style.display = '';
  const ansDiv = document.getElementById('qAnswer');
  ansDiv.style.display = showAnswer ? '' : 'none';
  const explDiv = document.getElementById('qExplanation');
  explDiv.style.display = showAnswer && q.explanation ? '' : 'none';
  if (showAnswer) {
    ansDiv.innerHTML = '<strong>参考答案：</strong>' + (q.type === 'single' ? q.answer : q.type === 'judge' ? (q.answer === 'A' ? '对' : '错') : q.answer);
    if (q.explanation) explDiv.innerHTML = '<strong>解析：</strong>' + q.explanation;
  }
  // 历史记录
  updateHistory();
  // 收藏状态
  updateStarBtn(Storage.isCollected(q.id));
  // 标记已作答
  if (answered[q.id] !== undefined) {
    if (q.type === 'single') renderSingleOptions(true);
    else if (q.type === 'judge') renderJudgeButtons(true);
    else if (q.type === 'calc') renderCalcInput(true);
  } else {
    if (q.type === 'single') renderSingleOptions(false);
    else if (q.type === 'judge') renderJudgeButtons(false);
    else if (q.type === 'calc') renderCalcInput(false);
  }
  // 快捷键提示
  updateShortcutHint();
  // 启动计时
  const cfg = Storage.getConfig();
  if (cfg.timerEnabled) {
    App.startTimer(q.id, (elapsed) => {
      document.getElementById('timerDisplay').textContent = '⏱️ ' + App.formatTime(elapsed);
      if (cfg.timeoutWarn && elapsed >= cfg.timePerQuestion) {
        document.getElementById('timerDisplay').className = 'timer timer-overtime';
        if (cfg.soundTimeout) App.playSound('timeout');
        if (cfg.timeoutMarkError && answered[q.id] === undefined) {
          App.showToast('⏰ 答题超时！', 'error');
        }
      }
    });
  }
  // 设置快捷键
  App.enableShortcuts(handleShortcut);
}
function updateShortcutHint() {
  const q = currentQuestion;
  if (!q) return;
  let hint = '快捷键: ';
  if (q.type === 'single') hint += '<kbd>1</kbd><kbd>2</kbd><kbd>3</kbd><kbd>4</kbd> 答题';
  else if (q.type === 'judge') hint += '<kbd>Z</kbd>=对 <kbd>X</kbd>=错';
  else if (q.type === 'calc') hint += '<kbd>Enter</kbd> 提交';
  hint += ' | <kbd>←</kbd><kbd>→</kbd> 切题 | <kbd>Space</kbd> 答案';
  document.getElementById('shortcutHint').innerHTML = hint;
}
function renderSingleOptions(answered) {
  const q = currentQuestion;
  const optsDiv = document.getElementById('qOptions');
  // 打乱选项
  const shuffleResult = App.shuffleOptions(q);
  shuffledOptMap = shuffleResult.map;
  shuffledNewAnswer = shuffleResult.newAnswer;
  const options = shuffleResult.options;
  optsDiv.innerHTML = options.map((opt, i) => {
    let cls = 'option-btn';
    const userAns = answeredState(q.id);
    if (userAns !== undefined) {
      if (opt.key === shuffledNewAnswer) cls += ' correct';
      if (opt.key === userAns && opt.key !== shuffledNewAnswer) cls += ' wrong';
    }
    const disabled = userAns !== undefined ? 'disabled' : '';
    return `<button class="${cls}" ${disabled} onclick="submitSingle('${opt.key}')">
      <strong>${i + 1}.</strong> ${opt.text}
    </button>`;
  }).join('');
}
function renderJudgeButtons(answered) {
  const q = currentQuestion;
  const optsDiv = document.getElementById('qOptions');
  const userAns = answeredState(q.id);
  const correctAns = q.answer;
  const clsA = userAns !== undefined ? (correctAns === 'A' ? 'judge-btn correct' : (userAns === 'A' ? 'judge-btn wrong' : 'judge-btn')) : 'judge-btn';
  const clsB = userAns !== undefined ? (correctAns === 'B' ? 'judge-btn correct' : (userAns === 'B' ? 'judge-btn wrong' : 'judge-btn')) : 'judge-btn';
  const disabled = userAns !== undefined ? 'disabled' : '';
  optsDiv.innerHTML = `
    <div class="btn-group" style="justify-content:center;padding:16px 0;">
      <button class="${clsA}" ${disabled} onclick="submitJudge('A')" style="background:var(--success);color:#fff;border-color:var(--success);">✅ 对 (Z)</button>
      <button class="${clsB}" ${disabled} onclick="submitJudge('B')" style="background:var(--danger);color:#fff;border-color:var(--danger);">❌ 错 (X)</button>
    </div>`;
}
function renderCalcInput(answered) {
  const optsDiv = document.getElementById('qOptions');
  const calcDiv = document.getElementById('qCalcInput');
  optsDiv.style.display = 'none';
  calcDiv.style.display = '';
  const userAns = answeredState(q.id);
  const disabled = userAns !== undefined ? 'disabled' : '';
  calcDiv.innerHTML = `
    <textarea class="calc-input" id="calcAnswerInput" ${disabled} placeholder="请输入你的答案（公式、文字描述均可，支持模糊匹配）..."></textarea>
    <br>
    <button class="btn btn-primary" ${disabled} onclick="submitCalc()" style="margin-top:8px;">📝 提交答案 (Enter)</button>
  `;
  if (userAns !== undefined) {
    document.getElementById('calcAnswerInput').value = userAns;
  }
  // 自动focus输入框
  if (!disabled) {
    setTimeout(() => {
      const input = document.getElementById('calcAnswerInput');
      if (input) input.focus();
    }, 100);
  }
}
function answeredState(qid) {
  if (answered[qid] !== undefined) return answered[qid] === true ? currentQuestion.answer : 'wrong-marked';
  return undefined;
}
// ===== 答案提交 =====
function submitSingle(key) {
  if (!currentQuestion || answered[currentQuestion.id] !== undefined) return;
  App.cancelDebounce();
  const userAns = shuffledOptMap ? Object.keys(shuffledOptMap).find(k => shuffledOptMap[k] === key) : key;
  const correct = App.checkAnswer({ ...currentQuestion, answer: shuffledNewAnswer || currentQuestion.answer }, key);
  answered[currentQuestion.id] = correct;
  const duration = App.stopTimer();
  Storage.addRecord(currentQuestion.id, { correct, duration });
  if (!correct) Storage.addError(currentQuestion.id);
  updateProgress();
  renderSingleOptions(true);
  showResultFeedback(correct, duration);
  if (correct) {
    App.debounceNext(() => nextQuestion(), 300);
  }
}
function submitJudge(key) {
  if (!currentQuestion || answered[currentQuestion.id] !== undefined) return;
  App.cancelDebounce();
  const correct = App.checkAnswer(currentQuestion, key);
  answered[currentQuestion.id] = correct;
  const duration = App.stopTimer();
  Storage.addRecord(currentQuestion.id, { correct, duration });
  if (!correct) Storage.addError(currentQuestion.id);
  updateProgress();
  renderJudgeButtons(true);
  showResultFeedback(correct, duration);
  if (correct) {
    App.debounceNext(() => nextQuestion(), 300);
  }
}
function submitCalc() {
  if (!currentQuestion || answered[currentQuestion.id] !== undefined) return;
  const input = document.getElementById('calcAnswerInput');
  if (!input || !input.value.trim()) {
    App.showToast('请输入答案', 'error');
    return;
  }
  App.cancelDebounce();
  const userAns = input.value.trim();
  const correct = App.checkAnswer(currentQuestion, userAns);
  answered[currentQuestion.id] = correct;
  const duration = App.stopTimer();
  Storage.addRecord(currentQuestion.id, { correct, duration });
  if (!correct) Storage.addError(currentQuestion.id);
  updateProgress();
  renderCalcInput(true);
  document.getElementById('calcAnswerInput').value = userAns;
  showResultFeedback(correct, duration);
  if (correct) {
    App.debounceNext(() => nextQuestion(), 300);
  }
}
function showResultFeedback(correct, duration) {
  if (correct) {
    App.playSound('correct');
    App.showToast(`✅ 回答正确！用时 ${duration}s`, 'success');
  } else {
    App.playSound('wrong');
    App.showToast(`❌ 回答错误，用时 ${duration}s`, 'error');
  }
}
// ===== 快捷键处理 =====
function handleShortcut(e) {
  if (!currentQuestion) return;
  const key = e.key;
  e.preventDefault();
  if (currentQuestion.type === 'single') {
    if (['1', '2', '3', '4'].includes(key)) {
      const opts = document.querySelectorAll('#qOptions .option-btn');
      const idx = parseInt(key) - 1;
      if (opts[idx] && !opts[idx].disabled) opts[idx].click();
    }
  } else if (currentQuestion.type === 'judge') {
    if (key === 'z' || key === 'Z') { const btn = document.querySelector('#qOptions .judge-btn:first-child'); if (btn && !btn.disabled) btn.click(); }
    if (key === 'x' || key === 'X') { const btn = document.querySelector('#qOptions .judge-btn:last-child'); if (btn && !btn.disabled) btn.click(); }
  } else if (currentQuestion.type === 'calc') {
    if (key === 'Enter') submitCalc();
  }
  if (key === ' ') { e.preventDefault(); toggleAnswer(); }
  if (key === 'ArrowLeft') prevQuestion();
  if (key === 'ArrowRight') nextQuestion();
}
// ===== 题目导航 =====
function prevQuestion() {
  App.cancelDebounce();
  App.stopTimer();
  if (currentIndex > 0) currentIndex--; else currentIndex = questions.length - 1;
  showAnswer = false;
  renderQuestion();
}
function nextQuestion() {
  App.cancelDebounce();
  App.stopTimer();
  if (currentIndex < questions.length - 1) currentIndex++; else currentIndex = 0;
  showAnswer = false;
  renderQuestion();
}
function toggleAnswer() {
  showAnswer = !showAnswer;
  const ansDiv = document.getElementById('qAnswer');
  const explDiv = document.getElementById('qExplanation');
  ansDiv.style.display = showAnswer ? '' : 'none';
  explDiv.style.display = showAnswer && currentQuestion && currentQuestion.explanation ? '' : 'none';
  if (showAnswer && currentQuestion) {
    ansDiv.innerHTML = '<strong>参考答案：</strong>' + (currentQuestion.type === 'single' ? currentQuestion.answer : currentQuestion.type === 'judge' ? (currentQuestion.answer === 'A' ? '对' : '错') : currentQuestion.answer);
    if (currentQuestion.explanation) explDiv.innerHTML = '<strong>解析：</strong>' + currentQuestion.explanation;
  }
}
// ===== 进度 =====
function updateProgress() {
  App.renderProgress(document.getElementById('examProgress'), answered);
}
// ===== 历史记录 =====
function updateHistory() {
  if (!currentQuestion) return;
  const records = Storage.getRecords();
  const r = records[currentQuestion.id];
  const btn = document.getElementById('historyToggle');
  if (r && r.history && r.history.length > 0) {
    btn.style.display = '';
    btn.textContent = `📜 作答记录 (对${r.correct}/错${r.wrong}，共${r.history.length}次)`;
    const content = document.getElementById('historyContent');
    content.innerHTML = r.history.slice(-10).reverse().map(h => {
      const d = new Date(h.time);
      const dateStr = d.toLocaleDateString() + ' ' + d.toLocaleTimeString();
      return `<div class="history-item">
        <span>${dateStr}</span>
        <span>${h.correct ? '✅' : '❌'} · ${h.duration}s</span>
      </div>`;
    }).join('');
  } else {
    btn.style.display = 'none';
  }
}
function toggleHistory() {
  const content = document.getElementById('historyContent');
  content.classList.toggle('open');
}
// ===== 重置与会话管理 =====
function resetSession() {
  App.showModal('重置本次练习', '确定要清空本次刷题痕迹吗？答题记录不会被删除。', () => {
    answered = {};
    showAnswer = false;
    currentIndex = 0;
    App.resetTimer();
    updateProgress();
    renderQuestion();
    App.showToast('✅ 已重置本次练习', 'success');
  }, '确认重置');
}
function exitQuiz() {
  const cfg = Storage.getConfig();
  if (cfg.exitBehavior === 'clear') {
    answered = {};
    App.stopTimer();
    window.location.href = 'index.html';
  } else if (cfg.exitBehavior === 'keep') {
    window.location.href = 'index.html';
  } else {
    App.showModal('退出刷题', '退出前是否需要保留本次练习痕迹？', () => {
      answered = {};
      App.stopTimer();
      window.location.href = 'index.html';
    }, '清空并退出', true);
    // 添加保留按钮逻辑 - 简化处理
    setTimeout(() => {
      const overlay = document.querySelector('.modal-overlay');
      if (overlay && overlay.classList.contains('active')) {
        const cancelBtn = overlay.querySelector('.btn-cancel');
        if (cancelBtn) {
          cancelBtn.textContent = '保留痕迹';
          cancelBtn.onclick = () => {
            overlay.classList.remove('active');
            window.location.href = 'index.html';
          };
        }
      }
    }, 50);
  }
}
// ===== 初始化 =====
document.addEventListener('DOMContentLoaded', initExam);
</script>
</body>
</html>
