<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>收藏题库 · 通信系统原理</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='28'>⭐</text></svg>">
</head>
<body>
<div class="container">
  <nav class="nav">
    <a href="index.html" class="btn btn-sm">🏠 首页</a>
    <a href="exam.html" class="btn btn-sm">📝 刷题</a>
    <a href="wrong.html" class="btn btn-sm">📋 错题本</a>
    <div class="nav-links">
      <a href="setting.html" class="btn btn-sm">⚙️ 设置</a>
      <button class="btn btn-sm btn-icon" onclick="toggleTheme()">🌓</button>
    </div>
  </nav>
  <div class="card">
    <div class="card-header"><span class="card-title">⭐ 收藏题库</span></div>
    <div id="collectProgress"></div>
  </div>
  <!-- 筛选区 -->
  <div class="card">
    <div class="filter-bar">
      <select id="filterType" onchange="refreshPage()">
        <option value="all">全部题型</option>
        <option value="single">单选</option>
        <option value="judge">判断</option>
        <option value="calc">计算</option>
      </select>
      <select id="filterTag" onchange="refreshPage()">
        <option value="all">全部标签</option>
      </select>
      <input type="search" id="collectSearch" placeholder="搜索收藏题目..." oninput="refreshPage()" style="min-width:180px;">
    </div>
  </div>
  <!-- 操作区 -->
  <div class="card" style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;">
    <div class="btn-group">
      <button class="btn btn-sm" onclick="selectAll()">☑️ 全选</button>
      <button class="btn btn-sm" onclick="invertSelect()">🔄 反选</button>
      <button class="btn btn-sm btn-danger" onclick="batchRemove()">🗑️ 批量取消收藏</button>
      <button class="btn btn-sm" onclick="batchExport()">📤 批量导出题目文本</button>
    </div>
    <div class="btn-group">
      <a href="exam.html?mode=collect" class="btn btn-primary btn-sm">🚀 收藏刷题模式</a>
      <button class="btn btn-sm btn-danger" onclick="clearAllCollect()">⚠️ 清空全部收藏</button>
    </div>
  </div>
  <!-- 标签管理 -->
  <div class="card" id="tagManager" style="display:none;">
    <div class="card-header"><span class="card-title">🏷️ 标签管理</span></div>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
      <input type="text" id="newTagInput" placeholder="输入新标签名..." style="min-width:140px;">
      <button class="btn btn-sm btn-primary" onclick="addNewTag()">➕ 添加标签</button>
      <span style="font-size:0.75em;color:var(--text-secondary);">提示：选择题目后可为题目添加/移除标签</span>
    </div>
    <div id="allTagsList" style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap;"></div>
  </div>
  <!-- 收藏列表 -->
  <div id="collectList"></div>
  <div id="loadMoreSentinel"></div>
</div>
<div class="toast"></div>
<script src="js/storage.js"></script>
<script src="js/question.js"></script>
<script src="js/common.js"></script>
<script>
let collectItems = [];
let displayPage = 0;
let selectedIds = new Set();
function toggleTheme() {
  const cfg = Storage.getConfig();
  cfg.theme = cfg.theme === 'dark' ? 'light' : 'dark';
  Storage.saveConfig(cfg);
  App.applyTheme(cfg.theme);
}
function getCollectItems() {
  const collect = Storage.getCollect();
  const questions = App.validQuestions();
  const filterType = document.getElementById('filterType').value;
  const filterTag = document.getElementById('filterTag').value;
  const searchQuery = document.getElementById('collectSearch')?.value || '';
  let items = Object.keys(collect).map(id => {
    const q = questions.find(qq => qq.id === parseInt(id));
    if (!q) return null;
    return { ...q, tags: collect[id] || [] };
  }).filter(Boolean);
  if (filterType !== 'all') items = items.filter(q => q.type === filterType);
  if (filterTag !== 'all') items = items.filter(q => q.tags.includes(filterTag));
  if (searchQuery.trim()) items = App.searchQuestions(searchQuery, items);
  return items;
}
function refreshPage() {
  collectItems = getCollectItems();
  displayPage = 0;
  selectedIds.clear();
  document.getElementById('collectList').innerHTML = '';
  renderPage();
  updateProgress();
  updateTagFilters();
}
function renderPage() {
  const container = document.getElementById('collectList');
  const page = App.getPageItems(collectItems, displayPage);
  const html = page.map(q => {
    const selected = selectedIds.has(q.id);
    const badgeClass = q.type === 'single' ? 'badge-single' : q.type === 'judge' ? 'badge-judge' : 'badge-calc';
    const typeLabel = q.type === 'single' ? '单选' : q.type === 'judge' ? '判断' : '计算';
    const records = Storage.getRecords();
    const r = records[q.id];
    const status = r ? (r.correct > r.wrong ? '✅' : r.wrong > r.correct ? '❌' : '⬜') : '⬜';
    const tagsHtml = q.tags.map(t => `<span class="tag">${t} <span class="tag-remove" onclick="event.stopPropagation();removeTagFromQ(${q.id},'${t}')">×</span></span>`).join('');
    return `<div class="card" style="padding:10px;">
      <div style="display:flex;align-items:flex-start;gap:8px;">
        <input type="checkbox" ${selected ? 'checked' : ''} onchange="toggleSelect(${q.id})" style="min-width:24px;min-height:24px;margin-top:4px;">
        <div style="flex:1;">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;">
            <span><span class="badge ${badgeClass}">${typeLabel}</span> <strong>#${q.id}</strong> ${status}</span>
            <span style="font-size:0.75em;color:var(--text-secondary);">${q.chapter}</span>
          </div>
          <div style="margin:4px 0;font-size:0.95em;">${q.question.substring(0, 100)}${q.question.length > 100 ? '...' : ''}</div>
          ${tagsHtml ? `<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;">${tagsHtml}</div>` : ''}
        </div>
      </div>
      <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center;">
        <button class="btn btn-sm btn-danger" onclick="removeCollect(${q.id})">取消收藏</button>
        <span style="font-size:0.75em;color:var(--text-secondary);">标签:</span>
        <input type="text" id="tagInput-${q.id}" placeholder="新标签" style="min-height:32px;min-width:100px;flex:1;max-width:140px;">
        <button class="btn btn-sm" onclick="addTagToQ(${q.id})">➕</button>
      </div>
    </div>`;
  }).join('');
  container.innerHTML += html;
  displayPage++;
  if (displayPage * App.PAGE_SIZE < collectItems.length) setupLoadMore();
}
function toggleSelect(qid) {
  if (selectedIds.has(qid)) selectedIds.delete(qid);
  else selectedIds.add(qid);
}
function selectAll() { collectItems.forEach(q => selectedIds.add(q.id)); refreshPage(); }
function invertSelect() { collectItems.forEach(q => { if (selectedIds.has(q.id)) selectedIds.delete(q.id); else selectedIds.add(q.id); }); refreshPage(); }
function addTagToQ(qid) {
  const input = document.getElementById('tagInput-' + qid);
  if (!input || !input.value.trim()) return;
  Storage.addTag(qid, input.value.trim());
  input.value = '';
  App.showToast('标签已添加', 'success');
  refreshPage();
}
function removeTagFromQ(qid, tag) {
  Storage.removeTag(qid, tag);
  App.showToast('标签已移除', 'success');
  refreshPage();
}
function addNewTag() {
  const input = document.getElementById('newTagInput');
  if (!input || !input.value.trim()) return;
  const tag = input.value.trim();
  // 为所有选中题目添加标签，或提示单独添加
  if (selectedIds.size > 0) {
    [...selectedIds].forEach(id => Storage.addTag(id, tag));
    App.showToast(`已为 ${selectedIds.size} 题添加标签"${tag}"`, 'success');
    input.value = '';
    refreshPage();
  } else {
    App.showToast('请先选择题目或使用题目旁的标签输入框', 'error');
  }
}
function updateTagFilters() {
  const tags = Storage.getAllTags();
  const select = document.getElementById('filterTag');
  const currentVal = select.value;
  select.innerHTML = '<option value="all">全部标签</option>';
  tags.forEach(t => { select.innerHTML += `<option value="${t}">${t}</option>`; });
  select.value = currentVal;
  // 全部标签列表
  const list = document.getElementById('allTagsList');
  if (tags.length > 0) {
    document.getElementById('tagManager').style.display = '';
    list.innerHTML = tags.map(t => `<span class="tag" onclick="document.getElementById('filterTag').value='${t}';refreshPage();">${t}</span>`).join('');
  } else {
    document.getElementById('tagManager').style.display = 'none';
  }
}
function removeCollect(qid) {
  Storage.toggleCollect(qid);
  App.showToast('已取消收藏', 'success');
  refreshPage();
}
function batchRemove() {
  if (selectedIds.size === 0) { App.showToast('请先选择题题目', 'error'); return; }
  App.showModal('批量取消收藏', `确定要取消收藏选中的 ${selectedIds.size} 道题目吗？`, () => {
    Storage.batchRemoveCollect([...selectedIds]);
    selectedIds.clear();
    App.showToast('已批量取消收藏', 'success');
    refreshPage();
  }, '确认取消', true);
}
function batchExport() {
  const ids = selectedIds.size > 0 ? [...selectedIds] : collectItems.map(q => q.id);
  const questions = App.validQuestions();
  const texts = ids.map(id => {
    const q = questions.find(qq => qq.id === id);
    if (!q) return '';
    let text = `【${q.type === 'single' ? '单选题' : q.type === 'judge' ? '判断题' : '计算题'}】#${q.id}\n${q.question}\n`;
    if (q.type === 'single' && q.options) text += q.options.map(o => `${o.key}. ${o.text}`).join('\n') + '\n';
    text += `答案：${q.type === 'judge' ? (q.answer === 'A' ? '对' : '错') : q.answer}\n`;
    const tags = Storage.getTags(q.id);
    if (tags.length) text += `标签：${tags.join(', ')}\n`;
    if (q.explanation) text += `解析：${q.explanation}\n`;
    return text + '\n---\n';
  }).join('\n');
  navigator.clipboard.writeText(texts).then(() => {
    App.showToast('已复制到剪贴板', 'success');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = texts;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    App.showToast('已复制到剪贴板', 'success');
  });
}
function clearAllCollect() {
  App.showModal('⚠️ 清空全部收藏', '此操作将永久删除所有收藏数据和标签，不可恢复！确定要继续吗？', () => {
    Storage.clearCollect();
    selectedIds.clear();
    App.showToast('✅ 已清空全部收藏', 'success');
    refreshPage();
  }, '确认清空', true);
}
function updateProgress() {
  const container = document.getElementById('collectProgress');
  const records = Storage.getRecords();
  const answered = {};
  collectItems.forEach(q => {
    const r = records[q.id];
    if (r) answered[q.id] = r.correct > r.wrong;
  });
  App.renderProgress(container, answered);
}
function setupLoadMore() {
  const sentinel = document.getElementById('loadMoreSentinel');
  if (!sentinel) return;
  const observer = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && displayPage * App.PAGE_SIZE < collectItems.length) renderPage();
  }, { rootMargin: '200px' });
  observer.observe(sentinel);
}
document.addEventListener('DOMContentLoaded', refreshPage);
</script>
</body>
</html>
